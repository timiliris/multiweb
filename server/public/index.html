<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <title>multiweb</title>
  <script>
    (function () {
      var t = localStorage.getItem("multiweb-theme");
      if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='6' fill='%230a0a0a'/><circle cx='17' cy='17' r='3' fill='%23ff5b3a'/></svg>">
</head>
<body>

  <section id="login-screen" class="screen login">
    <button type="button" class="theme-toggle theme-toggle--floating" data-theme-toggle aria-label="Changer de thème">
      <svg class="theme-toggle__icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="theme-toggle__icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
    </button>

    <div class="login__panel">
      <div class="brand brand--lg fade-in fade-in-1">
        <svg class="brand__mark brand__mark--lg" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="0" y="0" width="24" height="24" rx="6" class="brand__mark-bg"/>
          <circle cx="17" cy="17" r="3" class="brand__mark-dot"/>
        </svg>
        <span class="brand__name">multiweb</span>
      </div>
      <div class="login__head fade-in fade-in-2">
        <h1 class="login__title">Bienvenue.</h1>
        <p class="login__sub">Saisissez votre clef d'accès pour gérer vos sites.</p>
      </div>
      <form id="login-form" class="login__form fade-in fade-in-3">
        <label class="field">
          <span class="field__label">Mot de passe</span>
          <input type="password" name="password" class="input" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn btn--primary btn--block">
          <span class="btn__label">Entrer</span>
          <span class="btn__icon" aria-hidden="true">→</span>
        </button>
      </form>
    </div>
  </section>

  <section id="dashboard-screen" class="screen dash" hidden>
    <header class="topbar">
      <div class="brand">
        <svg class="brand__mark" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="0" y="0" width="24" height="24" rx="6" class="brand__mark-bg"/>
          <circle cx="17" cy="17" r="3" class="brand__mark-dot"/>
        </svg>
        <span class="brand__name">multiweb</span>
        <span class="brand__divider"></span>
        <span class="brand__sub" id="meta-domain">—</span>
      </div>
      <div class="topbar__actions">
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Changer de thème">
          <svg class="theme-toggle__icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="theme-toggle__icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
        </button>
        <button type="button" id="logout-btn" class="btn btn--ghost btn--sm">Déconnexion</button>
      </div>
    </header>

    <main class="dash__main">
      <section class="hero fade-in fade-in-1">
        <div class="hero__title">Tableau de bord</div>
        <div class="stats">
          <div class="stat">
            <div class="stat__num" id="stat-count">0</div>
            <div class="stat__label">Sites</div>
          </div>
          <div class="stat">
            <div class="stat__num" id="stat-size">0 o</div>
            <div class="stat__label">Stockage</div>
          </div>
          <div class="stat stat--wide">
            <div class="stat__num stat__num--mono" id="stat-domain">—</div>
            <div class="stat__label">Domaine de base</div>
          </div>
        </div>
      </section>

      <section class="card fade-in fade-in-2">
        <div class="card__head">
          <div>
            <h2 class="card__title">Déployer</h2>
            <p class="card__sub">Une archive .zip — 100 Mo max</p>
          </div>
          <div class="card__hint">
            <kbd class="kbd">.zip</kbd>
            <span class="card__hint-arrow">→</span>
            <kbd class="kbd kbd--mono">https://nom.<span id="domain-pill">…</span></kbd>
          </div>
        </div>
        <form id="deploy-form" class="deploy">
          <label id="dropzone" class="dropzone">
            <input type="file" id="file-input" class="dropzone__input" accept=".zip,application/zip">
            <div class="dropzone__inner">
              <div class="dropzone__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
              </div>
              <div class="dropzone__text">
                <div class="dropzone__hint" id="dropzone-hint">Glissez un fichier .zip</div>
                <div class="dropzone__sub" id="dropzone-sub">Ou cliquez pour parcourir</div>
              </div>
            </div>
          </label>
          <div class="deploy__form">
            <label class="field">
              <span class="field__label">Sous-domaine</span>
              <div class="input-group">
                <input type="text" id="site-name" class="input input--mono" placeholder="monapp" maxlength="32" required spellcheck="false" autocomplete="off">
                <span class="input-group__suffix" id="domain-suffix">.localhost</span>
              </div>
              <span class="field__help">a–z, 0–9, tirets · 32 caractères max</span>
            </label>
            <button type="submit" class="btn btn--primary btn--block" id="deploy-btn">
              <span class="btn__label">Publier</span>
              <span class="btn__icon" aria-hidden="true">→</span>
            </button>
          </div>
        </form>
      </section>

      <section class="sites-section fade-in fade-in-3">
        <div class="sites-section__head">
          <h2 class="sites-section__title">Sites</h2>
          <span class="sites-section__count" id="sites-count">—</span>
        </div>
        <div id="sites-list" class="sites-list" aria-live="polite"></div>
      </section>
    </main>
  </section>

  <div id="toast-host" class="toast-host" aria-live="polite"></div>

  <dialog id="confirm-dialog" class="modal">
    <form method="dialog" class="modal__card">
      <h3 class="modal__title" id="confirm-title">Confirmer ?</h3>
      <div class="modal__body" id="confirm-body">—</div>
      <div class="modal__actions">
        <button value="cancel" class="btn btn--ghost btn--sm">Annuler</button>
        <button value="ok" class="btn btn--danger btn--sm" id="confirm-ok">Confirmer</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
