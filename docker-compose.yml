services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${MULTIWEB_HTTP_PORT:-80}:80"
      - "${MULTIWEB_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - sites:/var/www/sites
      - caddy_data:/data
      - caddy_config:/config

  multiweb:
    build: .
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      MULTIWEB_PASSWORD: ${MULTIWEB_PASSWORD:-multiweb}
      MULTIWEB_BASE_DOMAIN: ${MULTIWEB_BASE_DOMAIN:-localhost}
      MULTIWEB_SCHEME: ${MULTIWEB_SCHEME:-http}
      MULTIWEB_EMAIL: ${MULTIWEB_EMAIL:-}
      MULTIWEB_CADDY_ADMIN_URL: http://caddy:2019
      MULTIWEB_CADDY_ADMIN_LISTEN: 0.0.0.0:2019
      MULTIWEB_DASHBOARD_UPSTREAM: multiweb:3000
    volumes:
      - sites:/var/www/sites

volumes:
  sites:
  caddy_data:
  caddy_config:
